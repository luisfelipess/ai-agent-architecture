    - Evidence & Tradeoffs: vol3/03-evidence-and-tradeoffs.md
    - Steering File Design: vol3/04-steering-file-design.md
    - Reference Architecture: vol3/05-reference-architecture.md
    - Working Together: vol3/06-workspace-design-working-together.md
    - Misconceptions: vol3/07-misconceptions.md
    - Recommendations: vol3/08-recommendations.md
    - Conclusion: vol3/09-conclusion.md
