    - Local Tools & CLI: vol1/03-local-tools-and-cli.md
    - Skills: vol1/04-skills.md
    - Steering Files: vol1/05-steering-files.md
    - Hooks: vol1/06-hooks.md
    - Comparison & Economics: vol1/07-comparison-and-economics.md
    - Local Package Guide: vol1/08-local-package-guide.md
    - Patterns Working Together: vol1/09-patterns-working-together.md
    - Misconceptions: vol1/10-misconceptions.md
    - Recommendations: vol1/11-recommendations.md
    - Conclusion: vol1/12-conclusion.md
  - "Vol 2 — Precision Agents":
    - Overview: vol2/00-overview.md
    - Why Mega-Prompts Break: vol2/01-mega-prompt-trap.md
    - Code-First & Modular Design: vol2/02-code-first-and-modular.md
    - Progressive Context Loading: vol2/03-progressive-context-loading.md
    - Validation Loops: vol2/04-validation-loops.md
    - Context Hygiene: vol2/05-context-hygiene.md
    - The Accuracy Flywheel: vol2/06-accuracy-flywheel.md
    - Precision Skills & Architecture: vol2/07-precision-skills-and-architecture.md
    - Principles Working Together: vol2/08-principles-working-together.md
    - Misconceptions: vol2/09-misconceptions.md
    - Recommendations: vol2/10-recommendations.md
    - Conclusion: vol2/11-conclusion.md
  - "Vol 3 — Workspace Contracts":
